server {
    listen 80;
    listen [::]:80;
    server_name voice.cloudaura.cloud;

    # Let Certbot handle ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name voice.cloudaura.cloud;

    ssl_certificate     /etc/letsencrypt/live/voice.cloudaura.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voice.cloudaura.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Twilio and LiveKit webhooks — FastAPI on 8005
    location / {
        proxy_pass         http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
