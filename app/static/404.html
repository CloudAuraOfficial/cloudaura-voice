<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Aura Voice Agent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            animation: drift 18s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            top: 20%; left: 10%;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #22d3ee, transparent 70%);
            bottom: 10%; right: 15%;
            animation-delay: -6s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 480px;
            padding: 0 24px;
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(96px, 20vw, 160px);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(34, 211, 238, 0.15));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: rgba(240, 240, 245, 0.5);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .aura-rings {
            width: 120px; height: 120px;
            margin: 0 auto 40px;
            position: relative;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid;
            animation: pulse 4s ease-in-out infinite;
        }

        .ring:nth-child(1) { inset: 0; border-color: rgba(139, 92, 246, 0.25); }
        .ring:nth-child(2) { inset: 15px; border-color: rgba(34, 211, 238, 0.2); animation-delay: -1s; }
        .ring:nth-child(3) { inset: 30px; border-color: rgba(244, 114, 182, 0.15); animation-delay: -2s; }

        .ring-core {
            position: absolute;
            inset: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-core svg {
            width: 24px; height: 24px;
            color: rgba(240, 240, 245, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f0f0f5;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 16px; height: 16px;
        }
    </style>
</head>
<body>
    <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="content">
        <div class="aura-rings">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring-core">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/>
                </svg>
            </div>
        </div>

        <div class="error-code">404</div>
        <h1>Signal lost</h1>
        <p>Aura couldn't find what you're looking for. The page may have moved or doesn't exist.</p>

        <a href="/" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to Aura
        </a>
    </div>
</body>
</html>
